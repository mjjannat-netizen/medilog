<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Doctor - MediLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(to right, #1976d2, #42a5f5) !important;
        }
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏥 MediLog</a>
        </div>
    </nav>

    <div class="container">
        <div class="main-card">
            <h2 class="mb-4">➕ Add New Doctor</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Specialization</label>
                    <select name="specialization" class="form-control">
                        <option>Cardiologist</option>
                        <option>Neurologist</option>
                        <option>Orthopedic</option>
                        <option>Pediatrician</option>
                        <option>Dermatologist</option>
                        <option>General Physician</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success">Save Doctor</button>
                <a href="/doctors" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
