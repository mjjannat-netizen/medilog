<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Appointments - MediLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(to right, #1976d2, #42a5f5) !important;
        }
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 40px;
        }
        .badge-pending { background-color: #ffc107; color: black; }
        .badge-confirmed { background-color: #198754; }
        .badge-cancelled { background-color: #dc3545; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏥 MediLog</a>
        </div>
    </nav>

    <div class="container">
        <div class="main-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📅 Appointments</h2>
                <a href="/appointments/add" class="btn btn-warning">+ Add Appointment</a>
            </div>
            <table class="table table-hover">
                <thead class="table-warning">
                    <tr>
                        <th>ID</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for a in appointments %}
                    <tr>
                        <td>{{ a[0] }}</td>
                        <td>{{ a[1] }}</td>
                        <td>{{ a[2] }}</td>
                        <td>{{ a[3] }}</td>
                        <td>
                            <span class="badge badge-{{ a[4]|lower }}">{{ a[4] }}</span>
                        </td>
                        <td>
                            <a href="/appointments/delete/{{ a[0] }}" class="btn btn-danger btn-sm" onclick="return confirm('Delete korbe?')">🗑️ Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
